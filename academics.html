<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academics</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.8);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

button{
    padding:10px;
    margin-top:10px;
    background:#2c7be5;
    color:white;
    border:none;
    cursor:pointer;
}

textarea,input{
    width:95%;
    padding:8px;
}
</style>
</head>

<body>

<div class="overlay">

<h2>ACADEMICS</h2>

<!-- ATTENDANCE -->
<div class="card">
<h3>Attendance</h3>
<input type="number" id="att" placeholder="Enter Attendance %">
<button onclick="saveAtt()">Save</button>
</div>

<!-- SUBJECTS -->
<div class="card">
<h3>Subjects</h3>
<input type="text" id="sub" placeholder="Enter Subject">
<button onclick="addSub()">Add</button>
<ul id="subList"></ul>
</div>

<!-- TIMETABLE -->
<div class="card">
<h3>Timetable</h3>
<input type="text" id="day" placeholder="Day">
<input type="text" id="t" placeholder="Subject">
<button onclick="addTT()">Add</button>
<table border="1" width="100%" style="color:white;">
<tr><th>Day</th><th>Subject</th></tr>
<tbody id="ttable"></tbody>
</table>
</div>

<!-- SUGGESTION BOX -->
<div class="card">
<h3>Suggestion Box</h3>
<textarea id="suggestion" placeholder="Enter suggestion"></textarea>
<button onclick="sendSug()">Submit</button>
</div>

<!-- LINK TO ADMIN -->
<div class="card" style="text-align:center;">
<button onclick="openAdmin()">Open Admin Console</button>
</div>

</div>

<script>

/// ================= ATTENDANCE =================
function saveAtt(){
    let a=document.getElementById("att").value;
    localStorage.setItem("attendance",a);
}

/// ================= SUBJECTS =================
function addSub(){
    let s=document.getElementById("sub").value;

    let arr=JSON.parse(localStorage.getItem("subjects"))||[];
    arr.push(s);

    localStorage.setItem("subjects",JSON.stringify(arr));

    loadSub();
}

function loadSub(){
    let arr=JSON.parse(localStorage.getItem("subjects"))||[];
    let list=document.getElementById("subList");

    list.innerHTML="";

    arr.forEach(x=>{
        list.innerHTML+=`<li>${x}</li>`;
    });
}
loadSub();

/// ================= TIMETABLE =================
function addTT(){
    let d=document.getElementById("day").value;
    let t=document.getElementById("t").value;

    let tt=JSON.parse(localStorage.getItem("timetable"))||{};
    tt[d]=t;

    localStorage.setItem("timetable",JSON.stringify(tt));

    loadTT();
}

function loadTT(){
    let tt=JSON.parse(localStorage.getItem("timetable"))||{};
    let body=document.getElementById("ttable");

    body.innerHTML="";

    for(let k in tt){
        body.innerHTML+=`<tr><td>${k}</td><td>${tt[k]}</td></tr>`;
    }
}
loadTT();

/// ================= SUGGESTIONS =================
function sendSug(){
    let s=document.getElementById("suggestion").value;

    let arr=JSON.parse(localStorage.getItem("suggestions"))||[];
    arr.push(s);

    localStorage.setItem("suggestions",JSON.stringify(arr));

    document.getElementById("suggestion").value="";
}

/// ================= OPEN ADMIN =================
function openAdmin(){
    window.location.href="admin.html";
}

</script>

</body>
</html>
