<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Console</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.box{
    width:300px;
    margin:auto;
    margin-top:120px;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px;
    width:95%;
    background:#2c7be5;
    color:white;
    border:none;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
}
</style>
</head>

<body>

<!-- ================= LOGIN SCREEN ================= -->
<div id="loginPage" class="box">
<h2>Admin Login</h2>

<input type="text" id="id" placeholder="Admin ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="err" style="color:red;"></p>
</div>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminPanel" class="overlay" style="display:none;">

<h2>ADMIN CONSOLE</h2>

<div class="card">
<h3>Attendance</h3>
<input type="number" id="att">
<button onclick="saveAtt()">Save</button>
</div>

<div class="card">
<h3>Subjects</h3>
<input type="text" id="sub">
<button onclick="addSub()">Add</button>
</div>

<div class="card">
<h3>Timetable</h3>
<input type="text" id="day" placeholder="Day">
<input type="text" id="t" placeholder="Subject">
<button onclick="addTT()">Add</button>
</div>

<div class="card">
<h3>Suggestions</h3>
<div id="sug"></div>
</div>

</div>

<script>

/// ================= LOGIN (NO SESSION STORAGE) =================
function login(){
    let id=document.getElementById("id").value;
    let pass=document.getElementById("pass").value;

    if(id==="admin@alliance.edu.in" && pass!==""){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadAll();
    } else {
        document.getElementById("err").innerText="Invalid Login";
    }
}

/// ================= ATTENDANCE =================
function saveAtt(){
    let a=document.getElementById("att").value;
    localStorage.setItem("attendance",a);
}

/// ================= SUBJECTS =================
function addSub(){
    let s=document.getElementById("sub").value;
    let arr=JSON.parse(localStorage.getItem("subjects"))||[];
    arr.push(s);
    localStorage.setItem("subjects",JSON.stringify(arr));
}

/// ================= TIMETABLE =================
function addTT(){
    let d=document.getElementById("day").value;
    let t=document.getElementById("t").value;

    let tt=JSON.parse(localStorage.getItem("timetable"))||{};
    tt[d]=t;

    localStorage.setItem("timetable",JSON.stringify(tt));
}

/// ================= LOAD SUGGESTIONS =================
function loadAll(){
    let s=JSON.parse(localStorage.getItem("suggestions"))||[];
    let box=document.getElementById("sug");

    box.innerHTML="";

    s.forEach(x=>{
        box.innerHTML+=`<div class="card">${x}</div>`;
    });
}

</script>

</body>
</html>
