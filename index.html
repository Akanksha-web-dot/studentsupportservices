<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Student Support</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("AU campus.jpeg") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Student Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <div class="error" id="error"></div>
</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if (email === "stu@alliance.edu.in" && pass !== "") {
        sessionStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
    } else {
        document.getElementById("error").innerText = "Invalid Login!";
    }
}
</script>

</body>
</html>
