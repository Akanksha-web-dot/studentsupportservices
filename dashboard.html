<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 20px;
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    background: rgba(255,255,255,0.3);
}

footer {
    text-align: center;
    margin-top: 30px;
    padding: 10px;
    background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="overlay">

<h1>WELCOME STUDENT</h1>

<div class="grid">

    <!-- ✅ FIXED WELLNESS LINK -->
    <div class="card" onclick="window.location.href='wellness.html'">
        <h3>WELLNESS</h3>
        <p>Mental & Physical Support</p>
    </div>

    <div class="card">
        <h3>ACADEMICS</h3>
        <p>Study Support</p>
    </div>

    <div class="card">
        <h3>FAQS</h3>
        <p>Common Questions</p>
    </div>

    <div class="card">
        <h3>EMERGENCY</h3>
        <p>Instant Help</p>
    </div>

    <div class="card">
        <h3>ADMIN CONSOLE</h3>
        <p>System Control</p>
    </div>

</div>

<footer>
ALLIANCE UNIVERSITY
</footer>

</div>

<script>
if (!sessionStorage.getItem("loggedIn")) {
    window.location.href = "index.html";
}
</script>

</body>
</html>
